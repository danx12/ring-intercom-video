repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: pixi-lint
        name: pixi run lint (py_compile, ruff format+check, manifest/hacs JSON)
        entry: pixi run lint
        language: system
        types: [python]
        pass_filenames: false
